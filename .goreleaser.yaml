---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: yamlls

before:
  hooks:
    - go mod tidy

builds:
  - id: yamlls
    main: ./cmd/yamlls
    binary: yamlls
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: yamlls
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - docs/**

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true # release-please owns the CHANGELOG

homebrew_casks:
  - name: yamlls
    ids:
      - yamlls
    binaries:
      - yamlls
    repository:
      owner: home-operations
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/home-operations/yamlls
    description: YAML language server with pluggable rendering for Flux sources.
    # Binaries aren't notarized — strip the quarantine bit so macOS doesn't
    # block the first run with "developer cannot be verified".
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/yamlls"] if OS.mac?
